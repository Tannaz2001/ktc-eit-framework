# Training-data experiment — uses the KTC 2023 training set instead of the
# held-out evaluation set.  Training samples are numbered 1–4 (not A/B/C).
# The training data lives under Codes_Matlab/TrainingData/ and the matching
# ground truths under Codes_Matlab/GroundTruths/.
#
# Usage:
#   python run.py --config configs/training_experiment.yaml
#
# To override dataset_root without editing this file, set the environment variable:
#   export KTC_DATASET_ROOT=/path/to/your/Codes_Matlab   (Linux / macOS)
#   set    KTC_DATASET_ROOT=C:\path\to\your\Codes_Matlab  (Windows)
# The env var takes priority over the dataset_root value below.

data_plugin: TrainingDataPlugin

# Root folder that contains TrainingData/ and GroundTruths/ sub-directories.
# Override at runtime with the KTC_DATASET_ROOT environment variable.
dataset_root: Codes_Matlab

# Direct path to Mesh_sparse.mat (or the directory that contains it).
mesh_path: Codes_Matlab/Mesh_sparse.mat

# Training data only has one difficulty level
levels: [1]

# Training samples are numbered 1–4 (quoted strings to match YAML spec)
samples: ['1', '2', '3', '4']

methods:
  - BackProjection   # linearised back-projection via pyEIT
  - GaussNewton      # linearised JAC solver via pyEIT

output_dir: outputs/training/
