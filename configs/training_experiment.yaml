# Training-data experiment — uses the KTC 2023 training set.
# Training samples are numbered 1–4.
#
# Data layout (just drop these folders in your project root):
#   Codes_Matlab/
#   ├── TrainingData/   (data1.mat ... data4.mat, ref.mat)
#   ├── GroundTruths/   (true1.mat ... true4.mat)
#   └── Mesh_sparse.mat
#
# Usage:
#   python run.py --config configs/training_experiment.yaml
#
# All paths are auto-detected. Override with env var if needed:
#   KTC_DATASET_ROOT=/custom/path python run.py --config ...

data_plugin: TrainingDataPlugin

# Auto-detected from project root (Codes_Matlab/, EvaluationData/, etc.)
dataset_root: Codes_Matlab
mesh_path: Codes_Matlab/Mesh_sparse.mat

levels: [1]
samples: ['1', '2', '3', '4']

methods:
  - BackProjection
  - LinearDifferenceReconstruction

output_dir: outputs/training/
