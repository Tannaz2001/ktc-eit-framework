# Mock experiment — no real measurement data required.
# MockDataPlugin generates deterministic synthetic voltages and ground truths.
# Useful for testing the pipeline without the KTC evaluation dataset.
#
# Usage:
#   python run.py --config configs/mock_experiment.yaml

data_plugin: MockDataPlugin
dataset_root: .
mesh_path: Codes_Matlab/Mesh_sparse.mat

levels: [1, 2, 3]
samples: [A, B]

methods:
  - BackProjection

output_dir: outputs/mock/
