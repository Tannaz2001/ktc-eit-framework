# Runtime method adapter test.
# Runs an external real reconstruction method against real KTC evaluation data.
#
# Usage:
#   python run.py --config configs/runtime_method_test.yaml

data_plugin: KTCDataPlugin
dataset_root: EvaluationData
mesh_path: Codes_Matlab/Mesh_sparse.mat

levels: [1, 2, 3, 4, 5, 6, 7]
samples: [A, B, C]

methods:
  - DampedLeastSquaresReconstruction

method_plugin_paths:
  - external_methods

output_dir: outputs/runtime_method_test/
