# Full KTC 2023 benchmark — all methods x 7 levels x 3 samples.
#
# Data layout (just drop these folders in your project root):
#   EvaluationData/
#   ├── level1/ ... level7/
#   └── GroundTruths/
#   Codes_Matlab/
#   └── Mesh_sparse.mat
#
# All paths are auto-detected. Override with env var if needed:
#   KTC_DATASET_ROOT=/custom/path python run.py --config ...

data_plugin: KTCDataPlugin
dataset_root: EvaluationData
mesh_path: Codes_Matlab/Mesh_sparse.mat

levels: [1, 2, 3, 4, 5, 6, 7]
samples: [A, B, C]

methods:
  - BackProjection
  - CompetitionCNN
  - LinearDifferenceReconstruction
  - KTC2023_CUQI2_main
  - KTC2023_CUQI1

method_plugin_paths:
  - external_methods
include_external_methods: true

output_dir: outputs/
