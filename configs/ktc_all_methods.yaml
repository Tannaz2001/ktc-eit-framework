# Full KTC 2023 benchmark — all methods x 7 levels x 3 samples.
#
# Data layout (just drop these folders in your project root):
#   EvaluationData/
#   ├── level1/ ... level7/
#   └── GroundTruths/
#   Codes_Matlab/
#   └── Mesh_sparse.mat
#
# All paths are auto-detected. Override with env var if needed:
#   KTC_DATASET_ROOT=/custom/path python run.py --config ...

data_plugin: KTCDataPlugin
dataset_root: EvaluationData
mesh_path: Codes_Matlab/Mesh_sparse.mat

levels: [1, 2, 3, 4, 5, 6, 7]
samples: [A, B, C]

methods:
  - ktc2023_postprocessing_master
  - KTC2023_CUQI2_main
  - ml_inverse_method_2
  - KTC2023_CUQI1
  - main
  - DampedLeastSquaresReconstruction
  - RegularizedFEMReconstruction
  - ReferenceFEM
  - LinearDifferenceReconstruction
  - BackProjection
  - GaussNewton
  - CompetitionCNN
  # New methods (separate configs: configs/ktc_abc2.yaml, ktc_e2e.yaml, ktc_pnpmasked.yaml)
  # Uncomment after verifying dependencies with: pip install torchmetrics deepinv torch_geometric
  # - ktc2023_abc2       # DIP+TV: slow (~30min/sample on CPU), no weights needed
  # - ktc2023_e2e        # End-to-end UNet: requires deepinv; models bundled (847MB)
  # - ktc2023_pnpmasked  # PnP+Graph UNet: requires torch_geometric; weights bundled (163KB)

method_plugin_paths:
  - external_methods
include_external_methods: true

output_dir: outputs/
