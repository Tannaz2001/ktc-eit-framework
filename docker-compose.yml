# Run the dashboard:            docker compose up -d
# Rebuild after a code change:  docker compose up -d --build
# Follow logs:                  docker compose logs -f
# Stop:                         docker compose down
#
# Defaults are usable as-is. To override any KTC_* / STREAMLIT_* setting, copy
# .env.example to .env — it is picked up automatically.

services:
  dashboard:
    build:
      context: .
      # 'slim' skips TensorFlow/Torch and drops CompetitionCNN and
      # ktc2023_postprocessing_master. See the Dockerfile header.
      target: full
    image: ktc-dashboard:full
    container_name: ktc-dashboard

    ports:
      - "${HOST_PORT:-8501}:8501"

    volumes:
      # Benchmark results only. These are multi-GB and machine-specific, so
      # they live on the host and outlive the container.
      #
      # EvaluationData/, Codes_Matlab/ and external_methods/ are deliberately
      # NOT mounted: the image already bundles them (~42 MB). Bind-mounting
      # them would make Docker create empty directories on any machine that
      # lacks the folders, masking the bundled copies and leaving the
      # dashboard with no data.
      - ./outputs:/app/outputs

    # Optional overrides; the image ships working defaults for all of these.
    env_file:
      - path: .env
        required: false

    environment:
      RUN_LOCK_TIMEOUT: "${RUN_LOCK_TIMEOUT:-7200}"
      CACHE_VALIDATION: "${CACHE_VALIDATION:-true}"
      MAX_DISK_USAGE_PCT: "${MAX_DISK_USAGE_PCT:-85}"

    # The image runs as uid 1000 ('app') and owns /app — no user: override
    # needed. The previous "1000:1000" pointed at a user the image never
    # created, leaving /app root-owned and configs/ unwritable.

    restart: unless-stopped

    # healthcheck is defined in the Dockerfile so `docker run` gets it too.
