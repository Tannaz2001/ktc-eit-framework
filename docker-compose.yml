services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.full
    image: ktc-dashboard:full
    ports:
      - "8501:8501"
    volumes:
      # Dataset (required for benchmark runs)
      - ./EvaluationData:/app/EvaluationData
      # Reconstruction results (2.7 GB) live outside the image
      - ./outputs:/app/outputs
      # Jacobian matrix cache (shared across team)
      - ./outputs/opcache/jacobians:/app/cache/jacobians
      # Training data for quick tests
      - ./Codes_Matlab:/app/Codes_Matlab
      # Runtime-generated benchmark configs (dashboard writes here; root-owned
      # image copy isn't writable by the non-root container user otherwise)
      - ./configs:/app/configs
      # Uploaded/registered method plugins (dashboard's "Add method" upload
      # writes here — same root-owned-image-vs-non-root-user issue as configs/)
      - ./external_methods:/app/external_methods
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      # Monitoring & safety
      - RUN_LOCK_TIMEOUT=7200
      - CACHE_VALIDATION=true
      - MAX_DISK_USAGE_PCT=85
    user: "1000:1000"
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5
