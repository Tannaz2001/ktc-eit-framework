name: Docker Build & Push

on:
  workflow_dispatch:  # Manual trigger only - to avoid auto-build on every src/ change

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tannaz2001
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from git tag or commit
        id: meta
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="latest"
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: docker_build          # needed so the digest step below can read this step's outputs
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            tannaz2001/ktc-dashboard:${{ steps.meta.outputs.VERSION }}
            tannaz2001/ktc-dashboard:${{ steps.meta.outputs.SHORT_SHA || 'latest' }}
            tannaz2001/ktc-dashboard:latest
          cache-from: type=registry,ref=tannaz2001/ktc-dashboard:buildcache
          cache-to: type=registry,ref=tannaz2001/ktc-dashboard:buildcache,mode=max

      - name: Docker image digest
        run: echo "Image pushed with digest ${{ steps.docker_build.outputs.digest }}"
