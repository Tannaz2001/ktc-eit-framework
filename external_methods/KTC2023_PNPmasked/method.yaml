name: ktc2023_pnpmasked
description: >
  KTC 2023 submission — Plug-and-Play Proximal Gauss-Newton with Graph U-Net denoiser
  and synthetic boundary masks. Uses a pre-trained GUNet denoiser (weights_denoiser.pth)
  as the proximal operator in a PGN iteration, then applies synthetic masks to suppress
  boundary artefacts near removed electrodes.

  REQUIRED: pip install torch_geometric
  Pre-trained weights: weights_denoiser.pth (bundled, 163 KB)
  Mesh:               Mesh_sparse.mat (bundled)
  Boundary masks:     Mask_Synthetic/lev{2-8}.mat (bundled)

runtime:
  python_versions: ["3.12", "3.11", "3.10"]
  env_override: KTC2023_PNPMASKED_PYTHON
  check_import: torch_geometric

solver:
  entry_point: run_method.py
  working_dir: .
  timeout: 600
  args: ["input_dir", "output_dir", "level"]
