name: ktc2023_e2e
description: >
  KTC 2023 submission — End-to-end UNet approach.
  A convolutional UNet maps EIT voltage measurements directly to a 256×256
  segmented image ({0,1,2}) using a learnable first linear layer initialised
  from Tikhonov reconstruction. A separate model is stored per difficulty level.

  REQUIRED: pip install deepinv
  Model weights are bundled in models/difficulty_{1-7}_learnedlinear.pth.tar

runtime:
  python_versions: ["3.12", "3.11", "3.10"]
  env_override: KTC2023_E2E_PYTHON
  check_import: deepinv

solver:
  entry_point: run_method.py
  working_dir: .
  timeout: 300
  args: ["input_dir", "output_dir", "level"]
