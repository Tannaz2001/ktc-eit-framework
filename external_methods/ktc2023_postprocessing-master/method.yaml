name: ktc2023_postprocessing_master
description: >
  KTC 2023 submission — postprocessing UNet for EIT segmentation.
  Trains on synthetic phantoms; uses a linearised time-difference
  reconstruction as input to a convolutional segmentation network.
  Requires two external asset downloads before benchmarking (see below).

  REQUIRED DOWNLOADS (method will silently return zeros without these):
    1. Model weights → postprocessing_model/version_01/model.pt
       https://seafile.zfn.uni-bremen.de/d/faaf3799e6e247198a23/
    2. Precomputed matrices → data/ directory (jac, mesh, smoothness files)
       https://seafile.zfn.uni-bremen.de/d/9108bc95b2e84cd285f8/

runtime:
  python_versions: ["3.12", "3.11", "3.10"]
  env_override: KTC2023_POSTPROCESSING_MASTER_PYTHON
  check_import: torch

solver:
  entry_point: main.py
  working_dir: .
  timeout: 900
  args: ["input_dir", "output_dir", "level"]
