<svg viewBox="0 0 740 480" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono,monospace" role="img">
  <title>KTC EIT Framework — Data Flow</title>
  <desc>Data flows from user upload through the runner to the dashboard leaderboard</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#848d97"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#1a7f37"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="740" height="480" fill="#f6f8fa" rx="10"/>

  <!-- Title -->
  <text x="370" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2328" letter-spacing="0.1em">KTC EIT FRAMEWORK — DATA FLOW</text>

  <!-- ── ROW 1: INPUTS ── -->
  <text x="30" y="58" font-size="8" font-weight="700" fill="#848d97" letter-spacing="0.12em">INPUTS</text>

  <!-- .py / .zip upload -->
  <rect x="30" y="66" width="130" height="52" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="95" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2328">.py / .zip Upload</text>
  <text x="95" y="98" text-anchor="middle" font-size="8" fill="#57606a">Streamlit sidebar</text>
  <text x="95" y="111" text-anchor="middle" font-size="8" fill="#57606a">file_uploader</text>

  <!-- KTC Dataset -->
  <rect x="200" y="66" width="130" height="52" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="265" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2328">KTC Dataset</text>
  <text x="265" y="98" text-anchor="middle" font-size="8" fill="#57606a">EvaluationData/</text>
  <text x="265" y="111" text-anchor="middle" font-size="8" fill="#57606a">.mat files + ref.mat</text>

  <!-- Ground Truth -->
  <rect x="370" y="66" width="130" height="52" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="435" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2328">Ground Truth</text>
  <text x="435" y="98" text-anchor="middle" font-size="8" fill="#57606a">GroundTruths/</text>
  <text x="435" y="111" text-anchor="middle" font-size="8" fill="#57606a">segmentation masks</text>

  <!-- Config -->
  <rect x="540" y="66" width="170" height="52" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="625" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2328">Run Config</text>
  <text x="625" y="98" text-anchor="middle" font-size="8" fill="#57606a">ktc_all_methods.yaml</text>
  <text x="625" y="111" text-anchor="middle" font-size="8" fill="#57606a">levels · samples · paths</text>

  <!-- ── ROW 2: PROCESSING ── -->
  <text x="30" y="160" font-size="8" font-weight="700" fill="#848d97" letter-spacing="0.12em">PROCESSING</text>

  <!-- Registry -->
  <rect x="30" y="168" width="130" height="52" rx="6" fill="#dafbe1" stroke="#a7f3c0" stroke-width="1.5"/>
  <text x="95" y="186" text-anchor="middle" font-size="9" font-weight="700" fill="#1a7f37">Registry</text>
  <text x="95" y="200" text-anchor="middle" font-size="8" fill="#1f2328">register_method()</text>
  <text x="95" y="213" text-anchor="middle" font-size="8" fill="#1f2328">load_bundle_methods()</text>

  <!-- BatchRunner -->
  <rect x="235" y="168" width="270" height="52" rx="6" fill="#dafbe1" stroke="#a7f3c0" stroke-width="1.5"/>
  <text x="370" y="186" text-anchor="middle" font-size="9" font-weight="700" fill="#1a7f37">BatchRunner</text>
  <text x="370" y="200" text-anchor="middle" font-size="8" fill="#1f2328">method × level × sample</text>
  <text x="370" y="213" text-anchor="middle" font-size="8" fill="#1f2328">sets KTC_DATASET_ROOT · calls reconstruct(batch)</text>

  <!-- Scorer -->
  <rect x="540" y="168" width="170" height="52" rx="6" fill="#dafbe1" stroke="#a7f3c0" stroke-width="1.5"/>
  <text x="625" y="186" text-anchor="middle" font-size="9" font-weight="700" fill="#1a7f37">KTC Scorer</text>
  <text x="625" y="200" text-anchor="middle" font-size="8" fill="#1f2328">DICE · IoU · KTC score</text>
  <text x="625" y="213" text-anchor="middle" font-size="8" fill="#1f2328">vs ground truth masks</text>

  <!-- ── ROW 3: METHOD TYPES ── -->
  <text x="30" y="265" font-size="8" font-weight="700" fill="#848d97" letter-spacing="0.12em">METHOD EXECUTION</text>

  <!-- Native method -->
  <rect x="30" y="273" width="195" height="52" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="127" y="291" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2328">Native Method (.py)</text>
  <text x="127" y="305" text-anchor="middle" font-size="8" fill="#57606a">reconstruct(batch) in-process</text>
  <text x="127" y="318" text-anchor="middle" font-size="8" fill="#57606a">BackProjection · GaussNewton…</text>

  <!-- Subprocess method -->
  <rect x="255" y="273" width="250" height="52" rx="6" fill="#fff8c5" stroke="#f0d847" stroke-width="1.5"/>
  <text x="380" y="291" text-anchor="middle" font-size="9" font-weight="700" fill="#9a6700">Bundle Method (.zip)</text>
  <text x="380" y="305" text-anchor="middle" font-size="8" fill="#1f2328">subprocess: entry_point.py input_dir out_dir level</text>
  <text x="380" y="318" text-anchor="middle" font-size="8" fill="#9a6700">writes reconstruction.mat → (256,256) uint8</text>

  <!-- DataBatch -->
  <rect x="535" y="273" width="175" height="52" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="622" y="291" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2328">DataBatch</text>
  <text x="622" y="305" text-anchor="middle" font-size="8" fill="#57606a">voltages · injection_patterns</text>
  <text x="622" y="318" text-anchor="middle" font-size="8" fill="#57606a">mesh · level · sample_id</text>

  <!-- ── ROW 4: OUTPUTS ── -->
  <text x="30" y="372" font-size="8" font-weight="700" fill="#848d97" letter-spacing="0.12em">OUTPUTS</text>

  <!-- scores.json -->
  <rect x="30" y="380" width="150" height="52" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="105" y="398" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2328">scores.json</text>
  <text x="105" y="412" text-anchor="middle" font-size="8" fill="#57606a">per-method averages</text>
  <text x="105" y="425" text-anchor="middle" font-size="8" fill="#57606a">outputs/run_*/</text>

  <!-- per_run_metrics -->
  <rect x="200" y="380" width="170" height="52" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="285" y="398" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2328">per_run_metrics.json</text>
  <text x="285" y="412" text-anchor="middle" font-size="8" fill="#57606a">every sample result</text>
  <text x="285" y="425" text-anchor="middle" font-size="8" fill="#57606a">level · grade · runtime</text>

  <!-- failures.json -->
  <rect x="390" y="380" width="140" height="52" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="460" y="398" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2328">failures.json</text>
  <text x="460" y="412" text-anchor="middle" font-size="8" fill="#57606a">errors + tracebacks</text>
  <text x="460" y="425" text-anchor="middle" font-size="8" fill="#57606a">method · level · sample</text>

  <!-- Dashboard -->
  <rect x="550" y="380" width="160" height="52" rx="6" fill="#dafbe1" stroke="#a7f3c0" stroke-width="1.5"/>
  <text x="630" y="398" text-anchor="middle" font-size="9" font-weight="700" fill="#1a7f37">Dashboard</text>
  <text x="630" y="412" text-anchor="middle" font-size="8" fill="#1f2328">merged leaderboard</text>
  <text x="630" y="425" text-anchor="middle" font-size="8" fill="#1f2328">all run dirs merged</text>

  <!-- ── ARROWS ── -->
  <line x1="95" y1="118" x2="95" y2="168" stroke="#848d97" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="265" y1="118" x2="310" y2="168" stroke="#848d97" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="435" y1="118" x2="575" y2="168" stroke="#848d97" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="580" y1="92" x2="505" y2="168" stroke="#848d97" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="160" y1="194" x2="235" y2="194" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <line x1="505" y1="194" x2="540" y2="194" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <line x1="300" y1="220" x2="180" y2="273" stroke="#848d97" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="220" x2="370" y2="273" stroke="#848d97" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="460" y1="220" x2="570" y2="273" stroke="#848d97" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="127" y1="325" x2="105" y2="380" stroke="#848d97" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="355" y1="325" x2="285" y2="380" stroke="#848d97" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="625" y1="220" x2="625" y2="350" stroke="#848d97" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="625" y1="350" x2="390" y2="380" stroke="#848d97" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="625" y1="220" x2="460" y2="380" stroke="#848d97" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="180" y1="406" x2="550" y2="406" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arr-grn)"/>

  <!-- Legend -->
  <line x1="30" y1="458" x2="55" y2="458" stroke="#1a7f37" stroke-width="2"/>
  <text x="60" y="462" font-size="8" fill="#1f2328">core flow</text>
  <line x1="120" y1="458" x2="145" y2="458" stroke="#848d97" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="150" y="462" font-size="8" fill="#1f2328">scoring writes</text>
  <rect x="240" y="452" width="10" height="10" rx="2" fill="#fff8c5" stroke="#f0d847"/>
  <text x="255" y="462" font-size="8" fill="#1f2328">zip/subprocess path</text>
</svg>
